<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if site_setting and site_setting.site_name %}{{ site_setting.site_name }}{% else %}Website{% endif %} - Bao tri</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(239, 68, 68, 0.2), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.16), transparent 45%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.28);
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        h1 {
            margin: 16px 0 10px;
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.65;
            font-size: 16px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 20px auto 0;
            background: var(--accent);
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">Maintenance Mode</span>
        <h1>
            {% if site_setting and site_setting.site_name %}
                {{ site_setting.site_name }} dang bao tri
            {% else %}
                Website dang bao tri
            {% endif %}
        </h1>
        <p>
            He thong tam thoi ngung phuc vu de nang cap. Vui long quay lai sau it phut.
            Cam on ban da thong cam!
        </p>
        <div class="dot" aria-hidden="true"></div>
    </main>
</body>
</html>
