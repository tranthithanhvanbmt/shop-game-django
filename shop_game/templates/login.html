{% extends 'base.html' %}
{% block title %}Đăng nhập{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center fw-bold">ĐĂNG NHẬP HỆ THỐNG</div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Tài khoản</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label>Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 fw-bold">ĐĂNG NHẬP</button>
                </form>
                <div class="text-center mt-3">
                    Chưa có tài khoản? <a href="{% url 'register' %}" class="text-danger fw-bold">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
