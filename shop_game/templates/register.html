{% extends 'base.html' %}
{% block title %}Đăng ký tài khoản{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white text-center fw-bold">TẠO TÀI KHOẢN MỚI</div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Tên đăng nhập (Viết liền không dấu)</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" name="re_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 fw-bold">ĐĂNG KÝ</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
